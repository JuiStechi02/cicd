on: [push]
jobs:
  testing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: pip install gradio mypy
      - run: mypy app.py

  build: 
    runs-on: ubuntu-latest
